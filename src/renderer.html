<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diff Diagram</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #243044;
    --border: #334155; --text: #e2e8f0; --text-dim: #64748b;
    --sidebar-w: 320px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 14px; gap: 12px; }
  #diagram-area { flex: 1; overflow: auto; background: var(--bg); }
  #svg-wrap { display: inline-block; padding: 24px; min-width: 100%; min-height: 100%; }
  h1 { font-size: 14px; font-weight: 600; }
  h2 { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
  .meta-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); }
  .meta-val { color: var(--text); font-weight: 500; }
  .mode-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .mode-btn { padding: 4px 10px; font-size: 11px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; }
  .mode-btn.active { background: #172554; border-color: #3b82f6; color: #93c5fd; }
  .mode-btn:hover:not(.active) { color: var(--text); }
  .legend { display: flex; flex-direction: column; gap: 5px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
  .swatch { width: 26px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .swatch-line { width: 26px; height: 0; border-top: 2px solid; flex-shrink: 0; }
  .changed-files { display: flex; flex-direction: column; gap: 3px; }
  .file-chip { font-size: 10px; font-family: monospace; padding: 2px 6px; border-radius: 3px; border-left: 2px solid; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-chip.added   { border-color: #22c55e; color: #86efac; background: rgba(34,197,94,.07); }
  .file-chip.modified{ border-color: #f59e0b; color: #fcd34d; background: rgba(245,158,11,.07); }
  .file-chip.removed { border-color: #ef4444; color: #fca5a5; background: rgba(239,68,68,.07); }
  .node-group { cursor: pointer; }
  .node-group:hover rect { filter: brightness(1.25); }
</style>
</head>
<body>
<div id="sidebar">
  <div>
    <h1>Diff Diagram</h1>
    <p style="color:var(--text-dim);font-size:10px;margin-top:3px">Angular architecture · PR overlay</p>
  </div>
  <div class="card">
    <h2>Scope</h2>
    <div class="meta-row"><span>Directory</span><span class="meta-val" id="meta-scope">—</span></div>
    <div class="meta-row"><span>Nodes</span><span class="meta-val" id="meta-nodes">—</span></div>
    <div class="meta-row"><span>Edges</span><span class="meta-val" id="meta-edges">—</span></div>
  </div>
  <div class="card">
    <h2>View Mode</h2>
    <div class="mode-group">
      <button class="mode-btn active" onclick="setMode('all')">All nodes</button>
      <button class="mode-btn" onclick="setMode('diffFocused')">Diff-focused</button>
    </div>
  </div>
  <div class="card">
    <h2>Node Legend</h2>
    <div class="legend">
      <div class="legend-row"><div class="swatch" style="background:#14532d;border:1.5px solid #22c55e"></div>Added</div>
      <div class="legend-row"><div class="swatch" style="background:#78350f;border:1.5px solid #f59e0b"></div>Modified</div>
      <div class="legend-row"><div class="swatch" style="background:#7f1d1d;border:1.5px dashed #ef4444"></div>Removed (ghost)</div>
      <div class="legend-row"><div class="swatch" style="background:#1e293b;border:1.5px solid #475569"></div>Unchanged</div>
      <div class="legend-row"><div class="swatch" style="background:#0a1829;border:1.5px solid #2563eb"></div>External (1-hop)</div>
      <div class="legend-row"><div class="swatch" style="background:#0f172a;border:1px dashed #334155"></div>Collapsed dir</div>
    </div>
  </div>
  <div class="card">
    <h2>Edge Legend</h2>
    <div class="legend">
      <div class="legend-row"><div class="swatch-line" style="border-color:#22c55e"></div>New import</div>
      <div class="legend-row"><div class="swatch-line" style="border-color:#f59e0b"></div>Modified import</div>
      <div class="legend-row"><div class="swatch-line" style="border-color:#ef4444;border-top-style:dashed"></div>Removed import</div>
      <div class="legend-row"><div class="swatch-line" style="border-color:#475569"></div>Unchanged import</div>
    </div>
  </div>
  <div class="card">
    <h2>Changed Files</h2>
    <div class="changed-files" id="changed-files-list"></div>
  </div>
</div>

<div id="diagram-area">
  <div id="svg-wrap"></div>
</div>

<script>
// ─── Embedded data (replaced by CLI) ──────────────────────────────────────────
const DIFF_DIAGRAM = __DIFF_DIAGRAM_DATA__;

// ─── Color palette ────────────────────────────────────────────────────────────
const NODE_FILL   = { added: '#14532d', modified: '#78350f', removed: '#7f1d1d', unchanged: '#1e293b' };
const NODE_STROKE = { added: '#22c55e', modified: '#f59e0b', removed: '#ef4444', unchanged: '#475569' };
const EDGE_STROKE = { added: '#22c55e', modified: '#f59e0b', removed: '#ef4444', unchanged: '#475569' };

function nodeFill(n)   { if (n.scope==='out-of-scope') return '#0a1829'; if (n.type==='stub') return '#0f172a'; return NODE_FILL[n.diff]  || NODE_FILL.unchanged; }
function nodeStroke(n) { if (n.scope==='out-of-scope') return '#2563eb'; if (n.type==='stub') return '#334155'; return NODE_STROKE[n.diff] || NODE_STROKE.unchanged; }
function edgeColor(d)  { return EDGE_STROKE[d] || EDGE_STROKE.unchanged; }

// ─── Render ───────────────────────────────────────────────────────────────────
const CHAR_W = 7, PAD = 8;

function truncate(s, maxW) {
  const max = Math.floor((maxW - PAD * 2) / CHAR_W);
  return s.length <= max ? s : s.slice(0, Math.max(1, max - 1)) + '…';
}

function buildPath(section) {
  const pts = [section.startPoint, ...(section.bendPoints || []), section.endPoint];
  if (pts.length === 2) return `M ${pts[0].x} ${pts[0].y} L ${pts[1].x} ${pts[1].y}`;
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length - 1; i++) {
    const mid = { x: (pts[i].x + pts[i+1].x) / 2, y: (pts[i].y + pts[i+1].y) / 2 };
    d += ` Q ${pts[i].x} ${pts[i].y} ${mid.x} ${mid.y}`;
  }
  d += ` L ${pts[pts.length-1].x} ${pts[pts.length-1].y}`;
  return d;
}

const SOURCE_ROOT = DIFF_DIAGRAM.sourceRoot || 'src/app';

function oosDisplayDir(file) {
  const dir = file && file.includes('/') ? file.substring(0, file.lastIndexOf('/')) : '.';
  const prefix = SOURCE_ROOT.endsWith('/') ? SOURCE_ROOT : SOURCE_ROOT + '/';
  return dir.startsWith(prefix) ? dir.slice(prefix.length) : dir;
}

function renderSvg(mode) {
  const { nodes, edges, width, height, container } = DIFF_DIAGRAM.modes[mode];

  const markers = Object.entries(EDGE_STROKE).map(([state, color]) =>
    `<marker id="a-${state}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${color}"/></marker>`
  ).join('');

  // Container box: positioned by ELK compound layout, not derived from node bounds
  let containerSvg = '';
  if (container) {
    const scopeDir = (DIFF_DIAGRAM.meta && DIFF_DIAGRAM.meta.scopeDir) || '';
    const featureLabel = scopeDir.split('/').pop() || scopeDir;
    containerSvg = `<rect x="${container.x}" y="${container.y}" width="${container.width}" height="${container.height}" rx="6" fill="#080e1a" stroke="#1e3a5f" stroke-width="1.5"/>
<text x="${container.x + 10}" y="${container.y + 13}" font-family="monospace" font-size="9" fill="#475569">${featureLabel}</text>`;
  }

  const edgePaths = edges.map(e => {
    const color = edgeColor(e.diff);
    const dash  = e.diff === 'removed' ? ' stroke-dasharray="5,3"' : '';
    const op    = e.diff === 'removed' ? ' opacity="0.5"' : '';
    const key   = e.diff || 'unchanged';
    return (e.sections || []).map(s =>
      `<path data-from="${e.from}" data-to="${e.to}" d="${buildPath(s)}" fill="none" stroke="${color}" stroke-width="1.5"${dash}${op} marker-end="url(#a-${key})"/>`
    ).join('');
  }).join('');

  const nodeElems = nodes.map(n => {
    const fill   = nodeFill(n);
    const stroke = nodeStroke(n);
    const isStub = n.type === 'stub';
    const isOos  = n.scope === 'out-of-scope';
    const label  = isStub ? truncate(n.label, n.width) : n.label;
    const dash   = (isStub || n.diff === 'removed') ? ' stroke-dasharray="4,2"' : '';
    const sw     = isOos ? '1' : '1.5';

    let inner;
    if (isStub) {
      inner = `<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${n.height}" rx="3" fill="${fill}" stroke="${stroke}" stroke-width="1"${dash}/>
<text x="${n.x + n.width/2}" y="${n.y + n.height/2 + 4}" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">${label}</text>`;
    } else if (n.typeOnly) {
      const typeOnlyFill = '#0d1f3c';
      if (isOos) {
        const dirPath = oosDisplayDir(n.file);
        inner = `<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${n.height}" rx="4" fill="${typeOnlyFill}" stroke="${stroke}" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="${n.x + PAD}" y="${n.y + n.height/2 - 3}" font-family="monospace" font-size="11" font-style="italic" fill="#e2e8f0">${label}</text>
<text x="${n.x + PAD}" y="${n.y + n.height/2 + 9}" font-family="monospace" font-size="8" fill="#64748b">${dirPath}</text>`;
      } else {
        const cy = n.y + n.height / 2 + 4;
        inner = `<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${n.height}" rx="4" fill="${typeOnlyFill}" stroke="${stroke}" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="${n.x + PAD}" y="${cy}" font-family="monospace" font-size="11" font-style="italic" fill="#e2e8f0">${label}</text>`;
      }
    } else if (isOos) {
      const dirPath = oosDisplayDir(n.file);
      inner = `<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${n.height}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="1"${dash}/>
<text x="${n.x + PAD}" y="${n.y + n.height/2 - 3}" font-family="monospace" font-size="11" fill="#e2e8f0">${label}</text>
<text x="${n.x + PAD}" y="${n.y + n.height/2 + 9}" font-family="monospace" font-size="8" fill="#64748b">${dirPath}</text>`;
    } else {
      const cy = n.y + n.height / 2 + 4;
      inner = `<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${n.height}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"${dash}/>
<text x="${n.x + PAD}" y="${cy}" font-family="monospace" font-size="11" fill="#e2e8f0">${label}</text>`;
    }

    return `<g class="node-group" data-id="${n.id}">${inner}</g>`;
  }).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
<defs>${markers}</defs>
<rect width="${width}" height="${height}" fill="#0f172a"/>
${containerSvg}
${edgePaths}
${nodeElems}
</svg>`;
}

// ─── Hover: highlight connected edges ─────────────────────────────────────────
function attachHover(svgEl) {
  svgEl.addEventListener('mouseover', e => {
    const g = e.target.closest('[data-id]');
    if (!g) return;
    const id = g.dataset.id;
    svgEl.querySelectorAll('path[data-from], path[data-to]').forEach(p => {
      const active = p.dataset.from === id || p.dataset.to === id;
      p.style.strokeWidth = active ? '3' : '1';
      p.style.opacity     = active ? '1' : '0.25';
    });
  });
  svgEl.addEventListener('mouseleave', () => {
    svgEl.querySelectorAll('path[data-from], path[data-to]').forEach(p => {
      p.style.strokeWidth = '';
      p.style.opacity     = '';
    });
  });
}

// ─── Mode state ───────────────────────────────────────────────────────────────
let currentMode = 'all';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === (mode === 'all' ? 'All nodes' : 'Diff-focused')));
  draw();
}

function draw() {
  const wrap = document.getElementById('svg-wrap');
  wrap.innerHTML = renderSvg(currentMode);
  attachHover(wrap.querySelector('svg'));
  const { nodes, edges } = DIFF_DIAGRAM.modes[currentMode];
  document.getElementById('meta-nodes').textContent = nodes.length;
  document.getElementById('meta-edges').textContent = edges.length;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
const meta = DIFF_DIAGRAM.meta || {};
document.getElementById('meta-scope').textContent = meta.scopeDir || '—';

// Changed files sidebar
const allNodes = DIFF_DIAGRAM.modes.all.nodes;
const changed = allNodes.filter(n => n.diff && n.diff !== 'unchanged');
const list = document.getElementById('changed-files-list');
if (changed.length === 0) {
  list.innerHTML = '<span style="color:var(--text-dim);font-size:11px">No changes</span>';
} else {
  list.innerHTML = changed.map(n =>
    `<div class="file-chip ${n.diff}" title="${n.type}">${n.label}</div>`
  ).join('');
}

draw();
</script>
</body>
</html>
